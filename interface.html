<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .table-container{
            overflow-y: scroll;
            height:200px
        }
        table {
            border: 1px solid;
            border-collapse: collapse;
            margin: 30px;
        }

        table td,
        table th {
        border-left: 1px solid #000;
        border-right: 1px solid #000;
        padding: 8px;
        }

        table td:first-child {
        border-left: none;
        }

        table td:last-child {
        border-right: none;
        }
  </style>
</head>
<body>
    <h1>Hospital System</h1>
    <br>
    <h2>Role Selection</h2>
    <input type="radio" id="Clinician" name="role" value="clinician">
    <label for="Clinician">Clinician</label>
    <input type="radio" id="Fulfilling_Staff" name="role" value="f_staff">
    <label for="Fulfilling_Staff">Fulfilling Staff</label>

    <h2>Order Form</h2>

    <label for="form_pt_name"> Patient Name: </label>
    <input id="form_pt_name"/>
    
    <label for="form_description"> Description: </label>
    <input id="form_description"/>

    <label for="order_type"> Order Type: </label>
    <select name="order_type" id="order_type">
    <option value="medication">Medication</option>
    <option value="lab">Lab</option>
    <option value="imaging">Imaging</option>
    </select>

    <label for="priority_type"> Priority: </label>
    <select name="priority_type" id="priority_type">
    <option value="STAT">STAT</option>
    <option value="URGENT">URGENT</option>
    <option value="ROUTINE">ROUTINE</option>
    </select>

    <label for="form_cl_name"> Clinician: </label>
    <input id="form_cl_name"/>
    <br>
    <br>
    <button onclick="completeSubmitOrder()">Submit Order</button>
    <br>
    <br>
    <h2>Triage Strategy</h2>
    <input type="radio" id="priority_first" name="triage" value="priority_first" onclick="changeTriage()" checked>
    <label for="priority_first">Priority First</label>
    <input type="radio" id="load_balancing" name="triage" value="load_balancing" onclick="changeTriage()">
    <label for="load_balancing">Load Balancing</label>
    <input type="radio" id="deadline_first" name="triage" value="deadline_first" onclick="changeTriage()">
    <label for="deadline_first">Deadline First</label>
    <br>
    <label for="triage_dept"> Staff Dept: </label>
    <select name="triage_dept" id="triage_dept">
    <option value="pharmacy">Pharmacy</option>
    <option value="lab">Lab</option>
    <option value="radiology">radiology</option>
    </select>
    <br>
    <h2>Pending Orders</h2>
    <label for="command_staff_name"> Fulfilling Staff: </label>
    <input id="command_staff_name"/>
    <label for="staff_dept"> Staff Dept: </label>
    <select name="staff_dept" id="staff_dept">
    <option value="pharmacy">Pharmacy</option>
    <option value="lab">Lab</option>
    <option value="radiology">radiology</option>
    </select>
    <br>
    <br>
    <label for="command_clinician_name"> Clinician Name: </label>
    <input id="command_clinician_name"/>
    <br>
    <br>
    <button onclick="completeClaimCommand()">Claim Order</button>
    <table>
        <thead>
        <tr>
            <th>Type</th>
            <th>Patient</th>
            <th>Actor</th>
            <th>Priority</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody id="pending_orders">
        </tbody>
    </table>
    <br>
    <br>
    <h2>Department-Organized Orders</h2>
    <table>
        <thead>
        <tr>
            <th>Type</th>
            <th>Patient</th>
            <th>Actor</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Command</th>
        </tr>
        </thead>
        <tbody id="dept_orders">
        </tbody>
    </table>
    <h2>Audit Logs</h2>
    <div class ="table-container">
        <table>
            <thead>
                <tr>
                    <th>Log</th>
                </tr>
            </thead>
            <tbody id="logs">
            </tbody>
        </table>
    </div>
    
    
    <!--Changing Triage-->
    <script>
        async function changeTriage(){
            alert("function started!")
            let host = "https://project2-backend-part2-2al0.onrender.com";
            let triage_type = "";
            let dept_type = document.getElementById("triage_dept").value;
            if (document.getElementById("priority_first").checked){
            triage_type = "priority_first";
            } else if (document.getElementById("load_balancing").checked){
            triage_type = "load_balancing";
            } else if (document.getElementById("deadline_first").checked){
            triage_type = "deadline_first"
            }

            let formData = new FormData();
            formData.append("triage_type", triage_type);
            formData.append("dept_type", dept_type)
            let request = {
                method: "POST",
                body: formData
            };


            let response = await fetch(host + "/order/change_triage", request);
            alert("dispatched response!")
            if (response.status == 200){
                alert("Triage type has been changed!");
            }else{
                alert("Something went wrong! Triage type could not be changed!");
            }
        }
    </script>

    <!--Audit Log-->
    <script>
        async function getLogs(){
            let host = "https://project2-backend-part2-2al0.onrender.com";
            let response = await fetch(host + "/order/audit_log");
            let result = await response.json();
            let table = document.getElementById("logs");
            table.innerHTML = "";

            for (const entry of result){
                let row = document.createElement("tr");
                let cell1 = document.createElement("td");
                cell1.textContent = entry;
                row.appendChild(cell1);
                table.appendChild(row);
            }

        }

        getLogs();
        setInterval(getLogs, 3000);
    </script>


    <!--Pending Orders-->
    <script>
        async function getPending(){
            let host = "https://project2-backend-part2-2al0.onrender.com";
            let response = await fetch(host + "/order/pending_orders");
            let result = await response.json();
            let table = document.getElementById("pending_orders");
            table.innerHTML = "";

            for (const entry of result){
                let type = entry.type;
                let id = entry.orderId;
                let patient = entry.patientName;
                let staff = entry.staff.name;
                let priority = entry.priority;
                let status = entry.status;


                let row = document.createElement("tr");
                let cell1 = document.createElement("td");
                cell1.textContent = type;
                row.appendChild(cell1);
                table.appendChild(row);

                let cell2 = document.createElement("td");
                cell2.textContent = patient;
                row.appendChild(cell2);
                table.appendChild(row);

                let cell3 = document.createElement("td");
                cell3.textContent = staff;
                row.appendChild(cell3);
                table.appendChild(row);

                let cell4 = document.createElement("td");
                cell4.textContent = priority;
                row.appendChild(cell4);
                table.appendChild(row);

                let cell5 = document.createElement("td");
                cell5.textContent = status;
                row.appendChild(cell5);
                table.appendChild(row);   

           }
        }
        getPending();
        setInterval(getPending, 3000);
        
    </script>
    





    <!--Order Submission-->
    <script>
        async function completeSubmitOrder(){
            if (!document.getElementById("Clinician").checked){
                alert("Order submission not completed! Only clinicians can submit orders!")
            }else if (checkEmptyInput(document.getElementById("form_cl_name").value) || checkEmptyInput(document.getElementById("form_description").value) || checkEmptyInput(document.getElementById("form_pt_name").value)){
                alert("Order submission not completed! One or more input fields are missing!")
            } else {

                let host = "https://project2-backend-part2-2al0.onrender.com";
                let patient_name = document.getElementById("form_pt_name").value;
                let clinician_name = document.getElementById("form_cl_name").value;
                let description = document.getElementById("form_description").value;
                let order_type = document.getElementById("order_type").value;
                let priority_type = document.getElementById("priority_type").value;


                let formData = new FormData();
                formData.append("patient_name", patient_name);
                formData.append("clinician_name", clinician_name);
                formData.append("description", description);
                formData.append("order_type", order_type);
                formData.append("priority_type", priority_type);

                let request = {
                    method: "POST",
                    body: formData
                };

                let response = await fetch(host + "/order/submit", request);
                    if (response.status == 200){
                    alert("Order has been submitted!")
                }else{
                    alert("Something went wrong! Order could not be submitted.")
                }

            }
        }

        function checkEmptyInput(var_val){
            if(var_val.trim() == ""){
                return true;
            } else {
                return false;
            }
        }


    </script>



</body>
</html>
