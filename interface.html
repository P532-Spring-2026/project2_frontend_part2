<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .table-container{
            overflow-y: scroll;
            height:200px
        }
        table {
            border: 1px solid;
            border-collapse: collapse;
            margin: 30px;
        }

        table td,
        table th {
        border-left: 1px solid #000;
        border-right: 1px solid #000;
        padding: 8px;
        }

        table td:first-child {
        border-left: none;
        }

        table td:last-child {
        border-right: none;
        }
  </style>
</head>
<body>
    <h1>Hospital System</h1>
    <br>
    <h2>Role Selection</h2>
        <input type="radio" id="Clinician" name="role" value="clinician">
        <label for="Clinician">Clinician</label>
        <input type="radio" id="Fulfilling_Staff" name="role" value="f_staff">
        <label for="Fulfilling_Staff">Fulfilling Staff</label>
        <input type="radio" id="Admin" name="role" value="admin">
        <label for="Admin">Admin</label>

    <br>     
    <h2>Admin Actions</h2>
    <button onclick="completeUndo()">Undo</button>
    <br>
    <br>
    <label for="replay_index"> Audit Index: </label>
    <input id="replay_index"/>
    <button onclick="completeReplay()">Replay</button>
    <br>
    <h2>Order Form</h2>

        <label for="form_pt_name"> Patient Name: </label>
        <input id="form_pt_name"/>
        
        <label for="form_description"> Description: </label>
        <input id="form_description"/>

        <label for="order_type"> Order Type: </label>

        <option value="imaging">Imaging</option>

        <label for="form_cl_name"> Clinician: </label>
        <input id="form_cl_name"/>
        <br>
        <br>
        <button onclick="completeSubmitOrder()">Submit Order</button>
    <br>
    <br>
    <h2>Triage Strategy</h2>

        <label for="priority_first">Priority First</label>
        <input type="radio" id="load_balancing" name="triage" value="load_balancing" onclick="changeTriage()">

        <input type="radio" id="deadline_first" name="triage" value="deadline_first" onclick="changeTriage()">

        <br>
        <br>
        <label for="triage_dept"> Staff Dept: </label>
        <select name="triage_dept" id="triage_dept">
        <option value="pharmacy">Pharmacy</option>
        <option value="lab">Lab</option>
        <option value="radiology">radiology</option>
        </select>
    <br>
    <br>
    <h2>Notification Services</h2>
        <h3>Clinician</h3>
            <label for="notifs_counter_c">Dashboard Notifications: </label>
            <span id="notifs_counter_c">0</span>
            <br>
            <input type="checkbox" id="console_notif_c" name="notifs" value="console" onclick="changeCNotif()">
            <label for="console_notif_c">Console</label>
            <input type="checkbox" id="email_notif_c" name="notifs" value="email" onclick="changeCNotif()">
            <label for="email_notif_c">E-Mail</label>
            <input type="checkbox" id="dashboard_notif_c" name="notifs" value="dashboard" onclick="changeCNotif()">
            <label for="dashboard_notif_c">Dashboard</label>
        <h3>Fulfilling Staff</h3>
            <label for="notifs_counter_f">Dashboard Notifications: </label>
            <span id="notifs_counter_f">0</span>
            <br>
            <input type="checkbox" id="console_notif_f" name="notifs" value="console" onclick="changeFNotif()">
            <label for="console_notif_f">Console</label>
            <input type="checkbox" id="email_notif_f" name="notifs" value="email" onclick="changeFNotif()">
            <label for="email_notif_f">E-Mail</label>
            <input type="checkbox" id="dashboard_notif_f" name="notifs" value="dashboard" onclick="changeFNotif()">
            <label for="dashboard_notif_f">Dashboard</label>
    <br>
    <br>
    <h2>Pending Orders</h2>
        <label for="command_staff_name"> Fulfilling Staff: </label>
        <input id="command_staff_name"/>
        <label for="staff_dept"> Staff Dept: </label>
        <select name="staff_dept" id="staff_dept">
        <option value="pharmacy">Pharmacy</option>
        <option value="lab">Lab</option>
        <option value="radiology">radiology</option>
        </select>
        <br>
        <br>
        <label for="command_clinician_name"> Clinician Name: </label>
        <input id="command_clinician_name"/>
        <br>
        <br>
        <button onclick="completeClaimCommand()">Claim Order</button>
        <table>
            <thead>
            <tr>
                <th>Type</th>
                <th>Patient</th>
                <th>Actor</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Command</th>
            </tr>
            </thead>
            <tbody id="pending_orders">
            </tbody>
        </table>
    <br>
    <br>
    <h2>Audit Logs</h2>
        <div class ="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Log</th>
                    </tr>
                </thead>
                <tbody id="logs">
                </tbody>
            </table>
        </div>
    

    <!---Undo-->
    <script>
        async function completeUndo(){
            let host = "https://project2-backend-part2-2al0.onrender.com";

            let request = {
                method: "POST",
              };

              let response = await fetch(host + "/order/undo_command", request);
              let msg = await response.text();
              if (response.status == 200){
                alert("Latest command undone!")
              } else if(response.status == 400){
                alert(msg);
              }else{
                alert("Something went wrong! Latest command could not be undone!");
              }
        }
    </script>

    <!---Replay-->
    <script>
        async function completeReplay(){
            let host = "https://project2-backend-part2-2al0.onrender.com";
            let index = document.getElementById("replay_index").value;


            let formData = new FormData();
              formData.append("index", index);
              
              let request = {
                method: "POST",
                body: formData
              };

              let response = await fetch(host + "/order/replay_command", request);
              let msg = await response.text();
              if (response.status == 200){
                alert("Command replayed!")
              } else if(response.status == 400){
                alert(msg);
              }else{
                alert("Something went wrong! Command could not be replayed!");
              }
        }
    </script>
    

    <!---Notifications Clinicians-->
  <script>
        async function changeCNotif(){
              let host = "https://project2-backend-part2-2al0.onrender.com";
              let notifs = [];
              let role = "clinician";
              if (document.getElementById("console_notif_c").checked){
                notifs.push("console")
              } if (document.getElementById("email_notif_c").checked){
                notifs.push("email")
              } if (document.getElementById("dashboard_notif_c").checked){
                notifs.push("dashboard")
              }

              let formData = new FormData();
              formData.append("notifs", notifs);
              formData.append("role", role);


              let request = {
                method: "POST",
                body: formData
              };

              let response = await fetch(host + "/order/change_notif", request);
              let msg = await response.text();
              if (response.status == 200){
                alert("Notifs succesfully changed!")
              } else if(response.status == 400){
                alert(msg);
              }else{
                alert("Something went wrong! Notifs could not be changed!");
              }
            }

            async function getCount_C() {
              let host = "https://project2-backend-part2-2al0.onrender.com";
              
              let response = await fetch(host + "/order/dash_counter" + "?role=clinician");

              let result = await response.json();
              let ans_string = "" + result;
              

              document.getElementById("notifs_counter_c").textContent = ans_string
        
            }

        getCount_C();
        setInterval(getCount_C, 2000);
    </script>

    <!--Changing Triage-->
    <script>
        async function changeTriage(){
            let host = "https://project2-backend-part2-2al0.onrender.com";
            let triage_type = "";
            let dept_type = document.getElementById("triage_dept").value;
            if (document.getElementById("priority_first").checked){
            triage_type = "priority_first";
            } else if (document.getElementById("load_balancing").checked){
            triage_type = "load_balancing";
            } else if (document.getElementById("deadline_first").checked){
            triage_type = "deadline_first"
            }

            let formData = new FormData();
            formData.append("triage_type", triage_type);
            formData.append("dept_type", dept_type)
            let request = {
                method: "POST",
                body: formData
            };


            let response = await fetch(host + "/order/change_triage", request);
            let msg = await response.text();
            if (response.status == 200){
                alert("Triage type has been changed!");
            }else if(response.status == 400){
                alert(msg);
            }
            else{
                alert("Something went wrong! Triage type could not be changed!");
            }
        }
    </script>


    <!--Audit Log-->
    <script>
        async function getLogs(){
            let host = "https://project2-backend-part2-2al0.onrender.com";
            let response = await fetch(host + "/order/audit_log");
            let result = await response.json();
            let table = document.getElementById("logs");
            table.innerHTML = "";

            for (const entry of result){
                let row = document.createElement("tr");
                let cell1 = document.createElement("td");
                cell1.textContent = entry;
                row.appendChild(cell1);
                table.appendChild(row);
            }

        }

        getLogs();
        setInterval(getLogs, 3000);
    </script>

    <!--Pending Orders-->
    <script>
        async function getPending(){
            let host = "https://project2-backend-part2-2al0.onrender.com";
            let response = await fetch(host + "/order/pending_orders");
            let result = await response.json();
            let table = document.getElementById("pending_orders");
            table.innerHTML = "";

            for (const entry of result){
                let type = entry.type;
                let id = entry.orderId;
                let patient = entry.patientName;
                let staff = entry.staff.name;
                let priority = entry.priority;
                let status = entry.status;
                let complete_btn = document.createElement("button");
                complete_btn.textContent ="Complete";
                let cancel_btn = document.createElement("button");
                cancel_btn.textContent ="Cancel";
                complete_btn.addEventListener("click", () => {
                    completeCompleteCommand(id)
                });
                cancel_btn.addEventListener("click", () => {
                    completeCancelCommand(id)
                });


                let row = document.createElement("tr");
                let cell1 = document.createElement("td");
                cell1.textContent = type;
                row.appendChild(cell1);
                table.appendChild(row);

                let cell2 = document.createElement("td");
                cell2.textContent = patient;
                row.appendChild(cell2);
                table.appendChild(row);

                let cell3 = document.createElement("td");
                cell3.textContent = staff;
                row.appendChild(cell3);
                table.appendChild(row);

                let cell4 = document.createElement("td");
                cell4.textContent = priority;
                row.appendChild(cell4);
                table.appendChild(row);

                let cell5 = document.createElement("td");
                cell5.textContent = status;
                row.appendChild(cell5);
                table.appendChild(row);

                let cell6 = document.createElement("td");
                if(status == "IN_PROGRESS"){
                    cell6.appendChild(complete_btn);
                } else if (status == "PENDING"){
                    cell6.appendChild(cancel_btn);
                }
                row.appendChild(cell6);
                table.appendChild(row);    

           }
        }

       
        
        
        
        async function completeClaimCommand(){
            let staff_name = document.getElementById("command_staff_name").value;
            let staff_dept = document.getElementById("staff_dept").value;
            if(staff_name.trim() == ""){
                alert("PLEASE fill in staff name! Command not executed");
            } else if(!document.getElementById("Fulfilling_Staff").checked){
                alert("Only fulfilling staff can claim orders! Command not executed");
            } else{
                let host = "https://project2-backend-part2-2al0.onrender.com";
                let formData = new FormData();
                formData.append("staff_name", staff_name);
                formData.append("staff_dept", staff_dept)
                let request = {
                    method: "POST",
                    body: formData
                };

                let response = await fetch(host + "/order/claim", request);
                let msg = await response.text();
                if (response.status == 200){
                    alert("Order has been claimed!");
                }else if (response.status == 400){
                    alert(msg);
                }else{
                    alert("Something went wrong! Order could not be claimed!");
                }
            }
            
        }

        

        async function completeCompleteCommand(id){
            let staff_name = document.getElementById("command_staff_name").value;
            if(staff_name.trim() == ""){
                alert("PLEASE fill in staff name! Command not executed");
            } else if(!document.getElementById("Fulfilling_Staff").checked){
                alert("Only fulfilling staff can complete orders! Command not executed");
            } else{
                let order_id = id;
                let host = "https://project2-backend-part2-2al0.onrender.com";
                let formData = new FormData();
                formData.append("staff_name", staff_name);
                formData.append("order_id", order_id);
                let request = {
                    method: "POST",
                    body: formData
                };

                let response = await fetch(host + "/order/complete", request);
                let msg = await response.text();
                if (response.status == 200){
                    alert("Order has been completed!");
                }else if (response.status == 400){
                    alert(msg);
                }
                else{
                    alert("Something went wrong! Order could not be completed!");
                }
            }
            
        }

        async function completeCancelCommand(id){
            let staff_name = document.getElementById("command_clinician_name").value;
            if(staff_name.trim() == ""){
                alert("PLEASE fill in staff name! Command not executed");
            } else if(!document.getElementById("Clinician").checked){
                alert("Only clinicians can cancel pending orders! Command not executed");
            } else {
                let order_id = id;
                let host = "https://project2-backend-part2-2al0.onrender.com";
                let formData = new FormData();
                formData.append("staff_name", staff_name);
                formData.append("order_id", order_id);
                let request = {
                    method: "POST",
                    body: formData
                };

                let response = await fetch(host + "/order/cancel", request);
                let msg = await response.text();
                if (response.status == 200){
                    alert("Order has been canceled!")
                }else if(response.status == 400){
                    alert(msg);
                }
                else{
                    alert("Something went wrong! Order could not be canceled!")
                }
            }
            
        }

        

        getPending();
        setInterval(getPending, 3000);
    </script>







    <!--Order Submission-->
    <script>
        async function completeSubmitOrder(){
            if (!document.getElementById("Clinician").checked){
                alert("Order submission not completed! Only clinicians can submit orders!")
            }else if (checkEmptyInput(document.getElementById("form_cl_name").value) || checkEmptyInput(document.getElementById("form_description").value) || checkEmptyInput(document.getElementById("form_pt_name").value)){
                alert("Order submission not completed! One or more input fields are missing!")
            } else {

                let host = "https://project2-backend-part2-2al0.onrender.com";
                let patient_name = document.getElementById("form_pt_name").value;
                let clinician_name = document.getElementById("form_cl_name").value;
                let description = document.getElementById("form_description").value;
                let order_type = document.getElementById("order_type").value;
                let priority_type = document.getElementById("priority_type").value;


                let formData = new FormData();
                formData.append("patient_name", patient_name);
                formData.append("clinician_name", clinician_name);
                formData.append("description", description);
                formData.append("order_type", order_type);
                formData.append("priority_type", priority_type);

                let request = {
                    method: "POST",
                    body: formData
                };

                let response = await fetch(host + "/order/submit", request);
                let msg = await response.text();
                if (response.status == 200){
                    alert("Order has been submitted!")
                }else if (response.status == 400){
                    alert(msg);
                }
                else{
                    alert("Something went wrong! Order could not be submitted.")
                }

            }
        }

        function checkEmptyInput(var_val){
            if(var_val.trim() == ""){
                return true;
            } else {
                return false;
            }
        }


    </script>
